<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dawn: #0e0c18;
    --gold: #f0c97a;
    --warm: #fdf4e3;
  }

  body {
    min-height: 100vh;
    background: var(--dawn);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background — single daily image, fades in on load */
  .bg {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center 55%;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    z-index: 0;
  }
  .bg.loaded { opacity: 1; }

  /* Overlay */
  .bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(8,6,20,0.52) 0%,
      rgba(8,6,20,0.28) 50%,
      rgba(8,6,20,0.58) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Glow orb */
  .glow {
    position: fixed;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,184,109,0.13) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
    animation: pulse 5s ease-in-out infinite alternate;
    z-index: 2;
  }
  @keyframes pulse {
    from { opacity: 0.4; transform: translate(-50%, -60%) scale(1); }
    to   { opacity: 0.9; transform: translate(-50%, -60%) scale(1.18); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: min(480px, 92vw);
    background: rgba(14, 12, 28, 0.62);
    border: 1px solid rgba(180,160,190,0.32);
    border-radius: 20px;
    padding: 48px 40px 40px;
    backdrop-filter: blur(18px);
    text-align: center;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45), inset 0 1px 0 rgba(232,184,109,0.1);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
  }
  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .eyebrow {
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
  }

  .prompt-text {
    font-family: 'Bodoni Moda', serif;
    font-size: clamp(1.5rem, 5.2vw, 2rem);
    font-weight: 400;
    line-height: 1.55;
    color: var(--warm);
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .prompt-text.fade-out {
    opacity: 0;
    transform: translateY(-8px);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    opacity: 0.5;
  }

  .counter {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--warm);
    opacity: 0.6;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(232,184,109,0.3);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 36px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(232,184,109,0.08);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover { border-color: var(--gold); letter-spacing: 0.28em; }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .date-line {
    margin-top: 24px;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--warm);
    opacity: 0.55;
    font-weight: 300;
  }
</style>
</head>

function getDateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

    bg.style.backgroundImage = `url('${bgImages[idx]}')`;
    setTimeout(() => bg.classList.add('loaded'), 80);
  };
  img.src = bgImages[idx];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = [];
let currentIndex = -1;

function refillQueue(excludeIdx) {
  queue = shuffle(prompts.map((_, i) => i).filter(i => i !== excludeIdx));
}

function nextPrompt(animate = true) {
  const el = document.getElementById('prompt');
  if (queue.length === 0) refillQueue(currentIndex);
  currentIndex = queue.shift();

  if (animate) {
    el.classList.add('fade-out');
    setTimeout(() => {
      el.textContent = prompts[currentIndex];
      el.classList.remove('fade-out');
    }, 400);
  } else {
    el.textContent = prompts[currentIndex];
  }
}

function init() {
  pickDailyBg();

  // Daily prompt seeded by date
  currentIndex = getDateSeed() % prompts.length;
  document.getElementById('prompt').textContent = prompts[currentIndex];
  document.getElementById('counter').textContent = `${prompts.length} prompts`;
  refillQueue(currentIndex);

  const now = new Date();
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  // Animate card in after a beat
  setTimeout(() => document.getElementById('card').classList.add('visible'), 200);
}

init();
</script>
</body>
</html>
