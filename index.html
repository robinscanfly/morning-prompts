    background-position: center 55%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(8,6,20,0.55) 0%, rgba(8,6,20,0.3) 50%, rgba(8,6,20,0.6) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* Mountains */
  .mountains { display: none; }

  /* Stars */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }
  .star {
    position: absolute;
    background: var(--warm);
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to   { opacity: 0.9; transform: scale(1.3); }
  }

  /* Glow orb */
  .glow {
    position: fixed;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,184,109,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite alternate;
    z-index: 2;
  }
  @keyframes pulse {
    from { opacity: 0.5; transform: translate(-50%, -60%) scale(1); }
    to   { opacity: 1;   transform: translate(-50%, -60%) scale(1.15); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: min(480px, 92vw);
    background: rgba(14, 12, 28, 0.65);
    border: 1px solid rgba(180,160,190,0.35);

    text-align: center;
    box-shadow: 0 8px 48px rgba(0,0,0,0.45), inset 0 1px 0 rgba(232,184,109,0.12);

  .eyebrow {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 1;
    margin-bottom: 28px;
  }

  .prompt-text {
    font-family: 'Bodoni Moda', serif;
    font-size: clamp(1.5rem, 5.2vw, 2rem);
    font-weight: 400;
    line-height: 1.55;
    color: var(--warm);
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .prompt-text.fade-out {
    opacity: 0;
    transform: translateY(-8px);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    opacity: 0.5;
  }

  .counter {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--warm);
    opacity: 0.7;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .btn {
    background: transparent;
    border: 1px solid rgba(232,184,109,0.3);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 36px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(232,184,109,0.08);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover { border-color: var(--gold); letter-spacing: 0.28em; }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .date-line {
    margin-top: 24px;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    color: var(--warm);
    opacity: 0.6;
    font-weight: 300;
  }


</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="glow"></div>

<svg class="mountains" viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,300 L0,180 L120,120 L220,160 L340,90 L460,140 L580,80 L700,130 L820,75 L940,125 L1060,85 L1180,130 L1300,100 L1440,150 L1440,300 Z" fill="rgba(80,88,130,0.15)"/>
  <path d="M0,300 L0,220 L100,175 L200,210 L320,155 L440,195 L560,145 L680,185 L800,150 L920,180 L1040,148 L1160,178 L1280,155 L1440,185 L1440,300 Z" fill="rgba(60,65,105,0.2)"/>
  <path d="M0,300 L0,255 L160,230 L320,248 L480,225 L640,242 L800,222 L960,238 L1120,228 L1280,242 L1440,232 L1440,300 Z" fill="rgba(40,43,75,0.25)"/>
</svg>

<div class="card">
  <div class="eyebrow">Morning Prompt</div>
  <div class="prompt-text" id="prompt">Loading your prompt...</div>
  <div class="divider"></div>
  <div class="counter" id="counter"></div>
  <button class="btn" onclick="nextPrompt()">New Prompt</button>
  <div class="date-line" id="date"></div>
</div>

<script>

  "What's one thing I'm genuinely proud of lately — even something small?",
  "What would I do today if I trusted myself completely?",
  "What am I most excited to build, create, or become this year?",
  "What small thing am I looking forward to today?",
  "Where is momentum already quietly building in my life?",
  "What would the most energized version of me do in the next hour?",
  "What's one belief I could loosen my grip on today?",
  "What would I do if I stopped waiting to feel ready?",
  "What does my body need from me today?",
  "Where in my life am I actually further along than I give myself credit for?",
  "What's working that I haven't paused to appreciate?",
  "If today were the start of something new, what would I want it to be?",
  "What would make today feel like a quiet win?",
  "What am I curious about right now — even a little?",
  "Who do I want to be today, in the smallest interactions?",
  "What would I do if comparison wasn't part of the equation?",
  "What part of my life feels most alive right now?",
  "If a year from now I looked back at today, what would I want to have started?",
  "What do I want more of — and what's one tiny step toward it?",
  "What feels hard right now that might actually be growth?",
  "What would I attempt if I knew people were rooting for me?",
  "What's one thing I can let go of today?",
  "How can I be a little more gentle with myself this morning?",
  "What's the most interesting thing about where my life is right now?",

  // 50 new prompts
  "What would I do today if no one was watching or judging?",
  "What's one thing I want to feel more of — and how could today offer a taste of it?",
  "Where have I been harder on myself than I would be on a close friend?",
  "What's something I used to dream about that I'm actually living now?",
  "If my future self could send me one message this morning, what might it say?",
  "What would I do if I stopped measuring my worth by productivity?",
  "What's one small risk I could take today that might open something up?",
  "What part of my life is asking for more attention right now?",
  "What does rest mean to me — and am I giving myself enough of it?",
  "What would I create if I knew it didn't have to be perfect?",
  "What's something I've been overthinking that I could just try?",
  "Where in my life am I growing in ways I might not be noticing?",
  "What would I do if I fully believed I deserved the things I want?",
  "What's one way I can show up for myself today like I would for someone I love?",
  "What's a challenge I've already overcome that proves I'm more capable than I think?",
  "What feels most true about who I'm becoming?",
  "If today had a theme, what would I want it to be?",
  "What's something beautiful or interesting I want to pay attention to today?",
  "What would change if I treated my energy as my most valuable resource?",
  "What's one thing I could let be easier than I've been making it?",
  "What does a life well-lived look like to me — right now, not someday?",
  "What's something I'm learning about myself lately?",
  "How can I bring more of my real self into today?",
  "What's a value I hold that I want to act on today, even in a small way?",
  "What's something that scared me before that I've quietly made peace with?",
  "What would I do if I stopped waiting for permission?",
  "What's the next step that's been hiding behind the one I keep thinking about?",
  "What would feel like a true gift to give myself today?",
  "Where am I holding back — and what would happen if I didn't?",
  "What's something I want to get better at that I haven't given myself space to practice?",
  "If I could describe the energy I want to carry through today in one word, what would it be?",
  "What's a story I keep telling myself that might not be true anymore?",
  "What would I do if I believed the timing was exactly right?",
  "What's something that lights me up that I haven't made time for lately?",
  "What's one thing going well that deserves more of my attention than my worries do?",
  "What would I do differently today if I woke up feeling brave?",
  "What's the most generous interpretation of where I am right now?",
  "What am I becoming that I couldn't have predicted a year ago?",
  "What's one way I could make today more playful?",
  "If I had no fear of failure, what would I start today?",
  "What's a small act of courage that's available to me today?",
  "What do I want my life to feel like — not just look like?",
  "What would I pursue if I knew that struggling through it was part of the point?",
  "What's something I've been postponing that would actually take less time than I think?",
  "What's one thing I can do today that my future self will be grateful for?",
  "Where is joy quietly available to me right now?",
  "What would I do if I trusted that things are unfolding in my favor?",
  "What part of my work or life feels most meaningful right now?",
  "What's one way I could be a little kinder to my body today?",
  "What do I want to remember about this season of my life?",

  // "If I knew it would work out..." series
  "If I knew it would all work out, what would I stop apologizing for?",
  "If I knew it would work out, what would I let myself want — out loud?",
  "If I knew it would work out, what fear would I finally stop carrying?",
  "If I knew it would work out, what would I believe about myself?",
  "If I knew it would work out, what would I do differently before noon today?",
  "If I knew it would work out, what story about myself would I finally let go of?",
  "If I knew it would work out, what would I dream bigger about?",
  "If I knew it would work out, what would I feel in my body right now?",
  "If I knew it would work out, what would I build — without rushing to prove it?",
  "If I knew it would work out, what would I stop waiting for someone else to do?",
  "If I knew it would work out, what would I say yes to that I've been hedging on?",
  "If I knew it would work out, what would I allow myself to enjoy today?",
  "If I knew it would work out, what would I think about myself at the end of the day?",
  "If I knew it would work out, what chapter would I realize I'm already in?",
  "If I knew it would work out, what would I change about how I talk to myself?",
  "If I knew it would work out, what would I invest in — my time, my energy, my attention?",
  "If I knew it would work out, what would feel like permission to begin?",
  "If I knew it would work out, what would I decide once and stop re-deciding?",
  "If I knew it would work out, what would I feel free to be curious about?",
  "If I knew it would work out, what would I do that I've been calling 'not practical'?",
  "If I knew it would work out, what would I stop shrinking to make room for?",
  "If I knew it would work out, what would I trust about the path I'm already on?",
  "If I knew it would work out, what would today feel like?",
  "If I knew it would work out, who would I let myself become?",
  "If I knew it would work out — and maybe it already is — what's my next move?"
];

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = [];
let currentIndex = -1;

function refillQueue(excludeIdx) {
  let indices = prompts.map((_, i) => i).filter(i => i !== excludeIdx);
  queue = shuffle(indices);
}

function getDateSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

function nextPrompt(animate = true) {
  const el = document.getElementById('prompt');

  if (queue.length === 0) refillQueue(currentIndex);
  currentIndex = queue.shift();

  if (animate) {
    el.classList.add('fade-out');
    setTimeout(() => {
      el.textContent = prompts[currentIndex];
      el.classList.remove('fade-out');
    }, 400);
  } else {
    el.textContent = prompts[currentIndex];
  }

  document.getElementById('counter').textContent = `${prompts.length} prompts`;
}

function init() {
  // Show today's daily prompt on load (deterministic by date)
  currentIndex = getDateSeed() % prompts.length;
  document.getElementById('prompt').textContent = prompts[currentIndex];
  document.getElementById('counter').textContent = `${prompts.length} prompts`;
  refillQueue(currentIndex);

  const now = new Date();
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Generate stars
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*65}%;
      left:${Math.random()*100}%;
      --d:${2 + Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(s);
  }
}

init();
</script>
</body>
</html>
